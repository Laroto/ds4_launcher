---
teleop_twist_joy_node:
  ros__parameters:
    # R1 (Right Bumper)
    enable_button: 5

    # L1 (Left Bumper)
    enable_turbo_button: 4

    # Walking mode:
    # - linear.x/y and angular.yaw are used as velocity commands.
    #
    # Body-pose mode:
    # - linear.x/y/z become body XYZ offsets.
    # - angular.roll/pitch/yaw become body roll, pitch, and yaw.
    # The body-pose controller clamps these to its configured safe limits.
    axis_linear:
      x: 1  # Left thumbstick up/down
      y: 0  # Left thumbstick left/right
      z: 7  # D-pad up/down
    scale_linear:
      x: 0.14
      y: 0.08
      z: 0.015
    scale_linear_turbo:
      x: 0.28
      y: 0.16
      z: 0.020

    axis_angular:
      yaw: 2    # Right thumbstick left/right
      roll: 3   # Right thumbstick up/down
      pitch: 6  # D-pad left/right
    scale_angular:
      yaw: 0.375
      roll: 0.12
      pitch: 0.12
    scale_angular_turbo:
      yaw: 0.75
      roll: 0.18
      pitch: 0.18

    # Enable publishing TwistStamped messages
    publish_stamped_twist: true

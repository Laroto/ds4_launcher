---
ds4_body_pose_mode:
  ros__parameters:
    joy_topic: joy
    mode_topic: body_pose_mode
    input_cmd_topic: cmd_vel_raw
    output_cmd_topic: cmd_vel
    # Circle
    body_pose_button: 1
    # Square
    walking_button: 3
    # Triangle
    rest_pose_button: 2
    rest_pose_service: go_to_rest_pose
    # Cross
    recovery_button: 0
    motor_disable_service: /motors/disable
    motor_enable_service: /motors/enable
    control_reset_service: /control/reset
    # D-pad up/down. Used for walking-speed steps only while body-pose mode is off.
    speed_axis: 7
    speed_axis_threshold: 0.5
    speed_step_ratio: 0.1
    min_speed_scale: 0.5
    max_speed_scale: 1.5
